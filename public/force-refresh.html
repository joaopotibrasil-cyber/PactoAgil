<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=/">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Atualizando Pacto Ágil...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d57d9 0%, #04142d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    p {
      color: rgba(255,255,255,0.8);
      font-size: 0.95rem;
    }
    .manual-link {
      margin-top: 1.5rem;
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
    }
    .manual-link a {
      color: #60a5fa;
      text-decoration: none;
    }
    .manual-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Atualizando Pacto Ágil</h1>
    <p>Nova versão detectada. Recarregando...</p>
    <p class="manual-link">
      Se não recarregar automaticamente, <a href="/">clique aqui</a>.
    </p>
  </div>
  <script>
    // Limpa todo o cache
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(name) {
          caches.delete(name);
        });
      });
    }

    // Limpa localStorage/sessionStorage de chunks antigos
    try {
      Object.keys(localStorage).forEach(function(key) {
        if (key.startsWith('pacto') || key.includes('chunk')) {
          localStorage.removeItem(key);
        }
      });
    } catch(_) {}

    // Redireciona forçado
    setTimeout(function() {
      window.location.href = '/?refresh=' + Date.now();
    }, 100);
  </script>
</body>
</html>
